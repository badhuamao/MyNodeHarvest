name: Node Harvest

on:
  workflow_dispatch: # 保留手动触发按钮，方便调试
  push:
    paths:
      - 'urls.txt'    # 当你修改链接列表时立即运行
  schedule:
    # 核心修改点：每 6 小时运行一次 (UTC 时间 0, 6, 12, 18 点)
    - cron: '0 */6 * * *' 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/set-up-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run convert script
        run: python convert.py

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add clash.yaml
          git commit -m "Timed Update: Cleaned nodes" || exit 0
          git push
