name: Node Harvest

on:
  workflow_dispatch: # 支持手动触发
  push:
    paths:
      - 'urls.txt'    # 修改链接列表时自动触发
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动运行一次

# 核心修复：解决 403 权限错误，允许 Action 推送文件到仓库
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4 # 修正了之前的 set-up-python 错误
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run convert script
        run: python convert.py

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add clash.yaml
          git commit -m "Timed Update: HY2 nodes only" || exit 0
          git push
